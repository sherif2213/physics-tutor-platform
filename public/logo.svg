    <ellipse cx="100" cy="100" rx="72" ry="30" transform="rotate(120 100 100)" stroke="url(#ring1)" opacity="0.8"/>
  </g>

  <circle cx="100" cy="100" r="11" fill="url(#ring2)"/>
  <circle cx="172" cy="100" r="5" fill="#F5B942"/>
  <circle cx="64" cy="43" r="5" fill="#2DD4BF"/>
  <circle cx="64" cy="157" r="5" fill="#F5B942"/>

  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="22" letter-spacing="2">
    <tspan fill="#F5B942">Z</tspan><tspan fill="#2DD4BF">S</tspan><tspan fill="#E5E7EB">H</tspan>
  </text>
