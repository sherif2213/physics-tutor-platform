<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5B942"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111A33"/>
      <stop offset="100%" stop-color="#05070F"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="97" fill="url(#bgGrad)" stroke="#F5B942" stroke-width="2.5" opacity="0.95"/>

  <g fill="none" stroke-width="3">
